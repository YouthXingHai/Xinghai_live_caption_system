<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Live Caption Controller</title>
    <link href="/static/controller.css" rel="stylesheet">
</head>

<body>

<h2>Scripts</h2>
<select id="script-select" onchange="switchScript(this.value)"></select>
<button onclick="reloadScripts()">Reload Scripts</button>

<h2>Controls</h2>

<div class="controls">

    <button onclick="first()">|◀ First</button>

    <button onclick="prev()">◀ Prev</button>

    <button onclick="next()">Next ▶</button>

    <button onclick="last()">Last ▶|</button>

</div>

<h2>Preview</h2>

<div id="preview"></div>

<script src="/static/controller.js"></script>

</body>
</html>
